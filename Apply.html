<!DOCTYPE html>
<html>
<head>
<title>Apply for Services</title>

<style>
body {font-family:Arial;background:#f4f4f4;margin:0;}
.container {
    max-width:500px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:8px;
}
input, select, textarea {
    width:100%;
    padding:10px;
    margin:10px 0;
}
button {
    background:#002147;
    color:white;
    padding:10px;
    border:none;
    width:100%;
}
</style>
</head>

<body>

<div class="container">
<h2>Apply for Service</h2>

<form action="https://formsubmit.co/bhavanicybercenter@gmail.com" method="POST">

<input type="text" name="name" placeholder="Full Name" required>
<input type="tel" name="phone" placeholder="Mobile Number" required>

<select name="service">
<option>Select Service</option>
<option>Aadhaar</option>
<option>PAN Card</option>
<option>Income Certificate</option>
<option>Job Application</option>
</select>

<textarea name="message" placeholder="Enter details"></textarea>

<button type="submit">Submit</button>

</form>

</div>

</body>
</html>
