<!DOCTYPE html>
<html>
<head>
<title>Apply for Service</title>

<style>
body {font-family:Arial;background:#f4f4f4;margin:0;}
.container {
    max-width:500px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:8px;
}
input, select, textarea {
    width:100%;
    padding:10px;
    margin:10px 0;
}
button {
    background:#002147;
    color:white;
    padding:10px;
    border:none;
    width:100%;
}
</style>
</head>

<body>

<div class="container">
<h2>Apply for Service</h2>

<form onsubmit="generateReceipt(event)">

<input type="text" name="name" placeholder="Full Name" required>
<input type="tel" name="phone" placeholder="Mobile Number" required>

<select name="service" required>
<option value="">Select Service</option>
<option>Aadhaar</option>
<option>PAN Card</option>
<option>Income Certificate</option>
<option>Job Application</option>
</select>

<textarea name="message" placeholder="Enter details"></textarea>

<button type="submit">Submit</button>

</form>

</div>

<script>
function generateReceipt(event) {
    event.preventDefault();

    let name = document.querySelector('[name="name"]').value;
    let phone = document.querySelector('[name="phone"]').value;
    let service = document.querySelector('[name="service"]').value;
    let message = document.querySelector('[name="message"]').value;

    let date = new Date().toLocaleString();
    let receiptNo = "RCPT" + Math.floor(Math.random() * 1000000);

    let receiptWindow = window.open('', '_blank');

    receiptWindow.document.write(`
        <html>
        <head>
        <title>Receipt</title>
        <style>
        body {font-family:Arial;padding:20px;}
        .box {border:2px solid black;padding:20px;}
        h2 {text-align:center;}
        </style>
        </head>
        <body>
        <div class="box">
        <h2>Bhavani Cyber Centre</h2>
        <p><strong>Receipt No:</strong> ${receiptNo}</p>
        <p><strong>Date:</strong> ${date}</p>

        <hr>

        <p><strong>Name:</strong> ${name}</p>
        <p><strong>Phone:</strong> ${phone}</p>
        <p><strong>Service:</strong> ${service}</p>
        <p><strong>Details:</strong> ${message}</p>

        <hr>

        <p><strong>Status:</strong> Application Received</p>
        </div>

        <script>
        window.print();
        <\/script>

        </body>
        </html>
    `);

    receiptWindow.document.close();
}
</script>

</body>
</html>
