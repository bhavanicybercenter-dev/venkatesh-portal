<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VR Logo</title>
<style>
    body {
        margin: 0;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    svg {
        width: 90vmin;
        height: 90vmin;
    }
    text {
        font-family: "Times New Roman", serif;
        fill: #fff;
        text-anchor: middle;
    }
    .small {
        font-size: 14px;
        letter-spacing: 2px;
    }
    .services {
        font-size: 12px;
        font-family: Arial, sans-serif;
    }
</style>
</head>
<body>

<svg viewBox="0 0 600 600">

<defs>
    <!-- Gold Gradient -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#fff2a8"/>
        <stop offset="40%" stop-color="#ffd700"/>
        <stop offset="70%" stop-color="#caa300"/>
        <stop offset="100%" stop-color="#fff2a8"/>
    </linearGradient>

    <!-- Blue Gradient -->
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#66ccff"/>
        <stop offset="50%" stop-color="#0066ff"/>
        <stop offset="100%" stop-color="#003399"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow">
        <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="gold"/>
    </filter>
</defs>

<!-- Outer Circle -->
<circle cx="300" cy="300" r="290" fill="none" stroke="url(#gold)" stroke-width="10"/>

<!-- Inner Circle -->
<circle cx="300" cy="300" r="260" fill="none" stroke="url(#blue)" stroke-width="4"/>

<!-- VR Monogram -->
<text x="260" y="220" font-size="120" fill="url(#blue)" filter="url(#glow)">V</text>
<text x="350" y="220" font-size="120" fill="url(#gold)" filter="url(#glow)">R</text>

<!-- Book Icon -->
<g transform="translate(130,200) scale(0.8)" fill="url(#blue)">
    <path d="M0 0 L40 0 L60 20 L20 20 Z"/>
    <path d="M40 0 L80 0 L100 20 L60 20 Z"/>
</g>

<!-- Laptop Icon -->
<g transform="translate(400,200) scale(0.8)" fill="url(#gold)">
    <rect x="0" y="0" width="60" height="40" rx="5"/>
    <rect x="10" y="45" width="40" height="5"/>
</g>

<!-- Name -->
<text x="300" y="290" font-size="34">VENKATESH RATHOD</text>

<!-- Place -->
<text x="300" y="320" font-size="18" fill="url(#gold)">GULEDAGUDDA</text>

<!-- Service Icons -->
<g class="services" fill="url(#gold)">
    <circle cx="120" cy="360" r="20"/>
    <circle cx="240" cy="360" r="20"/>
    <circle cx="360" cy="360" r="20"/>
    <circle cx="480" cy="360" r="20"/>
</g>

<!-- Service Text -->
<g class="services">
    <text x="120" y="400">LIBRARY</text>
    <text x="120" y="415">SERVICES</text>

    <text x="240" y="400">DIGITAL</text>
    <text x="240" y="415">SERVICES</text>

    <text x="360" y="400">GOVERNMENT</text>
    <text x="360" y="415">SERVICES</text>

    <text x="480" y="400">PRINTING</text>
    <text x="480" y="415">& DOCUMENTATION</text>
</g>

<!-- Tagline -->
<text x="300" y="460" font-size="16" fill="#ccc">
Helping Students & Public
</text>
<text x="300" y="480" font-size="16" fill="url(#gold)">
with Digital and Academic Services
</text>

<!-- Footer -->
<text x="300" y="540" class="small" fill="url(#gold)">
GULEDAGUDDA, KARNATAKA
</text>

</svg>

</body>
</html>
